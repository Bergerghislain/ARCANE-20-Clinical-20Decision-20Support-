[pytest]
testpaths = tests
addopts = -q --cov=backend_fastapi.app --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=65
markers =
  integration: tests nécessitant une base de données / services externes
  perf: tests de performance (pytest-benchmark; desactiver mesures avec pytest --benchmark-disable)

