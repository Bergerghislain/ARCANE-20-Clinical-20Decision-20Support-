# Pipeline CI ARCANE — priorité 1 (stabilisation technique)
# Exécute les mêmes vérifications que le labo : typecheck, tests frontend,
# tests backend (avec PostgreSQL), puis build production.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript, Vitest, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version pnpm lue depuis package.json ("packageManager") — ne pas dupliquer ici.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: ESLint (client)
        run: pnpm run lint

      - name: Frontend tests and coverage thresholds
        run: |
          pnpm run test:coverage
          node scripts/check-frontend-critical-coverage.mjs

      - name: Production build
        run: pnpm run build

  backend:
    name: Backend (pytest + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arcane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: arcane
      DB_CONNECT_TIMEOUT_SECONDS: "5"
      JWT_SECRET: ci_test_jwt_secret_not_for_production_use_only
      JWT_ISSUER: arcane
      JWT_AUDIENCE: arcane-client
      # Les seeds (seed_demo.py) créent de vrais hashes bcrypt : le fallback démo
      # reste DÉSACTIVÉ en CI (on prouve qu'on n'en dépend plus).
      ALLOW_DEMO_PASSWORD_FALLBACK: "false"
      COOKIE_SECURE: "false"
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_fastapi/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend_fastapi/requirements.txt ruff

      - name: Ruff (backend)
        run: ruff check backend_fastapi

      # Alembic est la source de vérité du schéma : une base vide est créée
      # intégralement par les migrations (plus de gros script SQL de schéma).
      - name: Apply database schema (alembic upgrade head)
        working-directory: backend_fastapi
        run: python -m alembic upgrade head

      # Vérifie que les migrations sont réversibles (déployabilité).
      - name: Migrations reversibility smoke test (downgrade -1 / upgrade head)
        working-directory: backend_fastapi
        run: |
          python -m alembic downgrade -1
          python -m alembic upgrade head

      # Données de démo (idempotent) avec de VRAIS hashes bcrypt (pas de psql requis).
      - name: Load seed data (demo users/patients)
        run: python backend_fastapi/scripts/seed_demo.py

      - name: Backend tests (including integration)
        working-directory: backend_fastapi
        run: python -m pytest tests -q --benchmark-disable

      - name: Critical module coverage thresholds
        run: python scripts/check-critical-coverage.py

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arcane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: arcane
      JWT_SECRET: e2e_ci_jwt_secret
      LLM_PROVIDER: mock_json
      ALLOW_DEMO_PASSWORD_FALLBACK: "false"
      CORS_ORIGINS: http://127.0.0.1:8080
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_fastapi/requirements.txt

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          python -m pip install -r backend_fastapi/requirements.txt

      - name: Init database
        run: |
          cd backend_fastapi && python -m alembic upgrade head
          cd ..
          python backend_fastapi/scripts/seed_demo.py

      - name: Install Playwright browser
        run: pnpm run test:e2e:install

      - name: Run Playwright E2E
        run: pnpm run test:e2e
