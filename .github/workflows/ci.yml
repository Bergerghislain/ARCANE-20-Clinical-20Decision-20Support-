# Pipeline CI ARCANE — priorité 1 (stabilisation technique)
# Exécute les mêmes vérifications que le labo : typecheck, tests frontend,
# tests backend (avec PostgreSQL), puis build production.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (TypeScript, Vitest, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version pnpm lue depuis package.json ("packageManager") — ne pas dupliquer ici.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Frontend tests
        run: pnpm run test

      - name: Production build
        run: pnpm run build

  backend:
    name: Backend (pytest + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arcane
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arcane"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: arcane
      DB_CONNECT_TIMEOUT_SECONDS: "5"
      JWT_SECRET: ci_test_jwt_secret_not_for_production_use_only
      JWT_ISSUER: arcane
      JWT_AUDIENCE: arcane-client
      # Les seeds SQL utilisent des hashes factices ; le fallback démo doit rester actif en CI.
      ALLOW_DEMO_PASSWORD_FALLBACK: "true"
      COOKIE_SECURE: "false"
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_fastapi/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend_fastapi/requirements.txt

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize PostgreSQL schema (setup_database.sql)
        run: bash scripts/ci-init-db.sh

      - name: Alembic migrations smoke test (upgrade/downgrade/upgrade)
        # Lancé depuis backend_fastapi pour que script_location=alembic et
        # prepend_sys_path=. (import de `app`) soient résolus correctement.
        working-directory: backend_fastapi
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade -1
          python -m alembic upgrade head

      - name: Backend tests (including integration)
        run: python -m pytest backend_fastapi/tests -q --benchmark-disable
