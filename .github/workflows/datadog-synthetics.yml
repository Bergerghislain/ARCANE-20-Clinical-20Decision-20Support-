# Tests synthetiques Datadog (optionnel).
# Ne s'execute pas sur push si les secrets DD_* ne sont pas configures
# (evite les runs rouges inutiles). Lance manuellement via Actions > Run workflow.

name: Run Datadog Synthetic tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  synthetics:
    runs-on: ubuntu-latest
    # Skip si les cles Datadog ne sont pas dans Settings > Secrets
    if: ${{ github.event_name == 'workflow_dispatch' || (secrets.DD_API_KEY != '' && secrets.DD_APP_KEY != '') }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Datadog Synthetic tests
        uses: DataDog/synthetics-ci-github-action@87b505388a22005bb8013481e3f73a367b9a53eb # v1.4.0
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          app_key: ${{ secrets.DD_APP_KEY }}
          test_search_query: "tag:e2e-tests"
